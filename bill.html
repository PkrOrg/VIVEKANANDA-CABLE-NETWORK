<!DOCTYPE html>
<html>
<head>
  <title>ABCD Bill Entry Sheet</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * { box-sizing: border-box; }

    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 15px;
      text-align: center;
      background: #f4f6f8;
    }

    h2 {
      margin-top: 40px;
    }

    form {
      width: 100%;
      max-width: 400px;
      margin: auto;
      padding: 15px;
      border-radius: 10px;
      background: #fff;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    input, select, button {
      padding: 12px;
      margin: 8px 0;
      font-size: 16px;
      border-radius: 6px;
    }

    input, select {
      width: 100%;
      border: 1px solid #ccc;
    }

    button {
      width: 20%;
      background: #0078d7;
      color: white;
      border: none;
    }

    button:hover {
      background: #005fa3;
    }

    #loading {
      display: none;
      font-weight: bold;
    }

    .back-btn {
      position: fixed;
      top: 10px;
      right: 10px;
      padding: 8px 12px;
      font-size: 14px;
      z-index: 1000;
    }

    #billArea {
      width: 100%;
      max-width: 500px;
      margin: auto;
      padding: 15px;
      border: 1px solid #000;
      background: #fff;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th, td {
      border: 1px solid #000;
      padding: 6px;
      font-size: 14px;
      text-align: left;
    }

    @media (max-width: 480px) {
      h2 { font-size: 20px; }
      th, td { font-size: 13px; }
    }
  </style>
</head>

<body>

<button class="back-btn" onclick="window.location.href='index.html'" >⬅ Back to Main Page</button>

<h2>ABCD Bill Entry Sheet</h2>

<div id="loading">Loading...</div>
<p id="status"></p>

<form id="dataForm">
  <select id="customerIdSelect" required disabled>
    <option>Loading IDs...</option>
  </select>

  <select id="customerNameSelect" required disabled>
    <option>Loading Names...</option>
  </select>

  <input type="number" id="amount" placeholder="Enter Amount" required />

  <select id="month" required>
    <option value="">Select Month</option>
    <option>January</option><option>February</option><option>March</option>
    <option>April</option><option>May</option><option>June</option>
    <option>July</option><option>August</option><option>September</option>
    <option>October</option><option>November</option><option>December</option>
  </select>

  <button type="submit" style="width:100%;">Submit</button>
</form>

<script>

    const isLoggedIn = localStorage.getItem("loggedIn");

    if (isLoggedIn !== "true") {
        window.location.replace("index.html");
    }

const scriptURL = "https://script.google.com/macros/s/AKfycbwhUHDUlohD-H7XBXEKbnrwW3Kc11hnMsRTU9umKtKwmQuFI2SGfO21lpjNlJb6IwYc/exec";

const form = document.getElementById("dataForm");
const statusEl = document.getElementById("status");
const loadingEl = document.getElementById("loading");
const idSel = document.getElementById("customerIdSelect");
const nameSel = document.getElementById("customerNameSelect");
const amount = document.getElementById("amount");
const month = document.getElementById("month");

month.selectedIndex = new Date().getMonth()+1;

form.addEventListener("submit", submitData);
idSel.addEventListener("change", () => nameSel.value = idSel.value);
nameSel.addEventListener("change", () => idSel.value = nameSel.value);

loadCustomers();

async function loadCustomers() {
  try {
    const res = await fetch(scriptURL + "?sheet=Sheet2");
    const data = await res.json();

    let optionsId = '<option value="">Select ID</option>';
    let optionsName = '<option value="">Select Name</option>';

    const valid = data.slice(1).filter(r => r && r[0] && r[1] && r[0] !== "" && r[1] !== "");

	// ID sorted
    valid.slice()
  	 .forEach(r => {
    		optionsId += `<option value="${r[0]}">${r[0]}</option>`;
  	 });

    // Name sorted
    valid.slice()
        .sort((a, b) => String(a[1]).localeCompare(String(b[1])))
        .forEach(r => {
            optionsName += `<option value="${r[0]}" data-name="${r[1]}">${r[1]}</option>`;
         });

    idSel.innerHTML = optionsId;
    nameSel.innerHTML = optionsName;

    idSel.disabled = false;
    nameSel.disabled = false;
  } catch {
    statusEl.textContent = "Error loading customers";
  }
}

function submitData(e) {
  e.preventDefault();

  const selected = nameSel.options[nameSel.selectedIndex];

  const payload = new URLSearchParams({
    sheet: "Sheet1",
    id: idSel.value,
    name: selected.dataset.name,
    amount: amount.value,
    month: month.value,
    issuedby: "PKR",
    token: localStorage.getItem("token")
  });

  loadingEl.style.display = "block";

  fetch(scriptURL, { method: "POST", body: payload })
    .then(r => r.json())
    .then(renderBill)
    .catch(() => statusEl.textContent = "Error submitting")
    .finally(() => loadingEl.style.display = "none");
}

function renderBill(data) {
  form.style.display = "none";
  statusEl.innerHTML = `
   <div id="billAreaMain">
          <br>
         <div id="billArea"
     style="width:650px;margin:auto;
            font-family:Arial, sans-serif;
            border:1px solid #000;
            padding:20px;">

  <!-- Company Header -->
  <div style="text-align:center;">
    <h2 style="margin:0;">ABCD COMPANY</h2>
    <p style="margin:4px 0;">
      Brahmanakraka, Nellore District, A.P - 524223
    </p>
    <p style="font-size:12px;margin:4px 0;">
      Phone: +91 8428820714
    </p>
    <hr>
  </div>

  <!-- Bill Title -->
  <h3 style="text-align:center;margin:10px 0;">
    BILL / INVOICE
  </h3>

  <!-- Bill Details -->
  <table width="100%" cellpadding="8" cellspacing="0"
         style="border-collapse:collapse;border:1px solid #000;">
    
    <tr align="left">
      <th style="border:1px solid #000;">Bill ID</th>
      <td style="border:1px solid #000;">${data.data[0]}</td>
    </tr>

    <tr align="left">
      <th  style="border:1px solid #000;">Customer ID</th>
      <td style="border:1px solid #000;">${data.data[1]}</td>
    </tr>

    <tr align="left">
      <th style="border:1px solid #000;">Customer Name</th>
      <td style="border:1px solid #000;">${data.data[2]}</td>
    </tr>

    <tr align="left">
      <th style="border:1px solid #000;">Billing Month</th>
      <td style="border:1px solid #000;">${data.data[3]}</td>
    </tr>

    <tr align="left">
      <th style="border:1px solid #000;">Issued Date</th>
      <td style="border:1px solid #000;">${data.data[5]}</td>
    </tr>

    <tr align="left">
      <th style="border:1px solid #000;">Issued By</th>
      <td style="border:1px solid #000;">${data.data[6]}</td>
    </tr>

    <tr align="left">
      <th style="border:1px solid #000;">Total Amount</th>
      <td style="border:1px solid #000;font-weight:bold;">
        Rs. ${data.data[4]}
      </td>
    </tr>
  </table>

  <br>

  <!-- Footer Note -->
  <p style="text-align:center;font-size:12px;">
    *This bill is auto-generated by the system and does not require a signature.*
  </p>

  <p style="text-align:center;font-size:12px;">
    Thank you for choosing ABCD Company.
  </p>
</div>

          <br>
          <button onclick="printBill()">Print</button>
          <button onclick="closeBill()">Close</button>
        </div>
     
  `;
}

function closeBill() {
  statusEl.innerHTML = "";
  form.style.display = "block";
  form.reset();
  month.selectedIndex = new Date().getMonth()+1;
}

function printBill() {
  const content = document.getElementById("billArea").innerHTML;

  const win = window.open("Bill", "Bill", "width=800,height=600");

  win.document.write(`
    <html>
    <head>
      <meta name="viewport" content="width=device-width">
      <style>
        body { font-family: Arial; padding:10px; }
        table { width:100%; border-collapse:collapse; }
        th, td { border:1px solid #000; padding:6px; }
      </style>
    </head>
    <body>${content}</body>
    </html>
  `);

  win.document.close();
  win.print();
  const intervalId = setInterval(() => {
    if (win.closed) {
       closeBill();
       clearInterval(intervalId); // stops the interval
    }
  }, 300);
}
</script>

</body>
</html>
