<!DOCTYPE html>
<html>
<head>
  <title>Prasanna Bill Entry Sheet</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin-top: 50px;
    }
    form {
      display: inline-block;
      padding: 20px;
      border: 1px solid #ccc;
      border-radius: 8px;
      background: #f9f9f9;
    }
    input, select, button {
      margin: 10px;
      padding: 8px;
      width: 200px;
    }
    button {
      cursor: pointer;
      background: #0078d7;
      color: white;
      border: none;
      border-radius: 4px;
    }
    button:hover {
      background: #005fa3;
    }
    #loading {
      display: none;
      font-weight: bold;
    }
  </style>
</head>

<body>

  <h2>Prasanna Bill Entry Sheet</h2>

  <div id="loading">⏳ Loading...</div>
  <p id="status"></p>

  <form id="dataForm">
    <input type="number" id="id" placeholder="Enter Customer Id" required />
    <input type="text" id="cname" placeholder="Enter Customer Name" required />
    <input type="number" id="amount" placeholder="Enter Amount" required />

    <select id="month" required>
      <option value="">Select Month</option>
      <option>January</option><option>February</option><option>March</option>
      <option>April</option><option>May</option><option>June</option>
      <option>July</option><option>August</option><option>September</option>
      <option>October</option><option>November</option><option>December</option>
    </select>

    <button type="submit">Submit</button>
  </form>

  <script>
    const scriptURL =
      "https://script.google.com/macros/s/AKfycbwhUHDUlohD-H7XBXEKbnrwW3Kc11hnMsRTU9umKtKwmQuFI2SGfO21lpjNlJb6IwYc/exec";

    const form = document.getElementById("dataForm");
    const statusEl = document.getElementById("status");
    const loadingEl = document.getElementById("loading");
    const submitBtn = form.querySelector("button");

    form.addEventListener("submit", submitData);

    function submitData(e) {
      e.preventDefault();
      toggleLoading(true);

      const payload = new URLSearchParams({
        id: id.value,
        name: cname.value,
        amount: amount.value,
        month: month.value,
        issuedby: "PKR"
      });

      fetch(scriptURL, {
        method: "POST",
        headers: { "Content-Type": "application/x-www-form-urlencoded" },
        body: payload
      })
      .then(res => res.text())
      .then(text => renderBill(JSON.parse(text)))
      .catch(err => {
        console.error(err);
        statusEl.textContent = "❌ Error inserting data.";
      })
      .finally(() => toggleLoading(false));
    }

    function toggleLoading(state) {
      loadingEl.style.display = state ? "block" : "none";
      submitBtn.disabled = state;
    }

    function renderBill(data) {
      form.style.display = "none";
      statusEl.innerHTML = `
        <div id="billArea">
          <br>
          <table border="1" cellpadding="6" cellspacing="0"
                 style="border-collapse:collapse;margin:auto;">
            <tr><th align="left">Bill Id</th><td>${data.data[0]}</td></tr>
            <tr><th align="left">Customer Id</th><td>${data.data[1]}</td></tr>
            <tr><th align="left">Name</th><td>${data.data[2]}</td></tr>
            <tr><th align="left">Month</th><td>${data.data[3]}</td></tr>
            <tr><th align="left">Amount</th><td>${data.data[4]}</td></tr>
            <tr><th align="left">Issued Date</th><td>${data.data[5]}</td></tr>
            <tr><th align="left">Issued By</th><td>${data.data[6]}</td></tr>
          </table>

          <br>
          <button onclick="printBill()">🖨️ Print</button>
          <button onclick="closeBill()">❌ Close</button>
        </div>
      `;
    }

    /* ✅ PRINT LOGIC */
    function printBill() {
      const content = document.getElementById("billArea").innerHTML;
      const original = document.body.innerHTML;

      document.body.innerHTML = content;
      window.print();
      document.body.innerHTML = original;

      location.reload(); // ensures scripts reattach cleanly
    }

    /* ✅ CLOSE LOGIC */
    function closeBill() {
      statusEl.innerHTML = "";
      form.reset();
      form.style.display = "block";
      window.scrollTo({ top: 0, behavior: "smooth" });
    }
  </script>

</body>
</html>
