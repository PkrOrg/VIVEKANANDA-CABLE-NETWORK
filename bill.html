<!DOCTYPE html>
<html>
<head>
  <title>ABCD Bill Entry Sheet</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin-top: 50px;
    }
    form {
      display: inline-block;
      padding: 20px;
      border: 1px solid #ccc;
      border-radius: 8px;
      background: #f9f9f9;
    }
    input, select, button {
      margin: 10px;
      padding: 8px;
      width: 200px;
    }
    button {
      cursor: pointer;
      background: #0078d7;
      color: white;
      border: none;
      border-radius: 4px;
    }
    button:hover {
      background: #005fa3;
    }
    #loading {
      display: none;
      font-weight: bold;
    }
  </style>
</head>

<body>

  <h2>ABCD Bill Entry Sheet</h2>

  <div id="loading"> Loading...</div>
  <p id="status"></p>

  <form id="dataForm">
    <select id="customerIdSelect" required disabled>
      <option value="">Loading customer IDs...</option>
    </select><br>

    <select id="customerNameSelect" required disabled>
      <option value="">Loading customer names...</option>
    </select><br>

    <input type="number" id="amount" placeholder="Enter Amount" required /><br>

    <select id="month" required>
      <option value="">Select Month</option>
      <option>January</option><option>February</option><option>March</option>
      <option>April</option><option>May</option><option>June</option>
      <option>July</option><option>August</option><option>September</option>
      <option>October</option><option>November</option><option>December</option>
    </select><br>

    <button type="submit">Submit</button>
  </form>

  <script>
    const scriptURL = `https://script.google.com/macros/s/AKfycbwhUHDUlohD-H7XBXEKbnrwW3Kc11hnMsRTU9umKtKwmQuFI2SGfO21lpjNlJb6IwYc/exec`;

    const form = document.getElementById("dataForm");
    const statusEl = document.getElementById("status");
    const loadingEl = document.getElementById("loading");
    const customerIdSelect = document.getElementById("customerIdSelect");
    const customerNameSelect = document.getElementById("customerNameSelect");
    const amountInput = document.getElementById("amount");
    const monthSelect = document.getElementById("month");
    const submitBtn = form.querySelector("button");

    form.addEventListener("submit", submitData);
    customerIdSelect.addEventListener("change", () => syncCustomerSelects("id"));
    customerNameSelect.addEventListener("change", () => syncCustomerSelects("name"));
    loadCustomers();

    async function loadCustomers() {
      customerIdSelect.disabled = true;
      customerNameSelect.disabled = true;
      submitBtn.disabled = true;

      try {
        const response = await fetch(scriptURL+"?sheet=Sheet2");
        const text = await response.text();
        const customers = normalizeCustomers(text);

        if (!customers.length) {
          throw new Error("No customer records found.");
        }

        customerIdSelect.innerHTML = `
          <option value="">Select Customer ID</option>
          ${customers
            .map(
              customer => `<option value="${escapeHtml(customer.id)}">${escapeHtml(customer.id)}</option>`
            )
            .join("")}
        `;

        customerNameSelect.innerHTML = `
          <option value="">Select Customer Name</option>
          ${customers
            .map(
              customer => `
                <option value="${escapeHtml(customer.id)}" data-name="${escapeHtml(customer.name)}">
                  ${escapeHtml(customer.name)}
                </option>`
            )
            .join("")}
        `;

        customerIdSelect.disabled = false;
        customerNameSelect.disabled = false;
        submitBtn.disabled = false;
      } catch (err) {
        console.error(err);
        customerIdSelect.innerHTML = '<option value="">Unable to load customer IDs</option>';
        customerNameSelect.innerHTML = '<option value="">Unable to load customer names</option>';
        statusEl.textContent = "Unable to load customer list. Check the customer data URL.";
      }
    }

    function syncCustomerSelects(source) {
      if (source === "id") {
        customerNameSelect.value = customerIdSelect.value;
      } else {
        customerIdSelect.value = customerNameSelect.value;
      }
    }

    function normalizeCustomers(rawText) {
      const parsed = JSON.parse(rawText);
      const rows = Array.isArray(parsed)
        ? parsed
        : Array.isArray(parsed.data)
          ? parsed.data
          : Array.isArray(parsed.customers)
            ? parsed.customers
            : Array.isArray(parsed.records)
              ? parsed.records
              : [];

      return rows
        .map(row => {
          if (Array.isArray(row)) {
            const [customerId, customerName] = row;

            if (isHeaderRow(customerId, customerName) || customerId == null || customerName == null) {
              return null;
            }

            return {
              id: String(customerId).trim(),
              name: String(customerName).trim()
            };
          }

          if (row && typeof row === "object") {
            const customerId = row.id ?? row.customerId ?? row.customerID ?? row.ID;
            const customerName = row.name ?? row.customerName ?? row.customer ?? row.cname;

            if (isHeaderRow(customerId, customerName) || customerId == null || customerName == null) {
              return null;
            }

            return {
              id: String(customerId).trim(),
              name: String(customerName).trim()
            };
          }

          return null;
        })
        .filter(Boolean);
    }

    function isHeaderRow(customerId, customerName) {
      const idText = String(customerId ?? "").trim().toLowerCase();
      const nameText = String(customerName ?? "").trim().toLowerCase();

      return ["id", "customer id", "customerid"].includes(idText)
        && ["name", "customer name", "customername", "cname"].includes(nameText);
    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function submitData(e) {
      e.preventDefault();

      const selectedId = customerIdSelect.value;
      const selectedNameOption = customerNameSelect.options[customerNameSelect.selectedIndex];

      if (!selectedId || !selectedNameOption || !selectedNameOption.dataset.name) {
        statusEl.textContent = "Please select customer ID and customer name.";
        return;
      }

      if (customerNameSelect.value !== selectedId) {
        statusEl.textContent = "Customer ID and name do not match.";
        return;
      }

      toggleLoading(true);
      statusEl.textContent = "";

      const payload = new URLSearchParams({
        sheet: "Sheet1",
        id: selectedId,
        name: selectedNameOption.dataset.name,
        amount: amountInput.value,
        month: monthSelect.value,
        issuedby: "PKR"
      });

      fetch(scriptURL, {
        method: "POST",
        headers: { "Content-Type": "application/x-www-form-urlencoded" },
        body: payload
      })
      .then(res => res.text())
      .then(text => renderBill(JSON.parse(text)))
      .catch(err => {
        console.error(err);
        statusEl.textContent = "Error inserting data.";
      })
      .finally(() => toggleLoading(false));
    }

    function toggleLoading(state) {
      loadingEl.style.display = state ? "block" : "none";
      customerIdSelect.disabled = state;
      customerNameSelect.disabled = state;
      submitBtn.disabled = state;
    }

    function renderBill(data) {
      form.style.display = "none";
      statusEl.innerHTML = `
        <div id="billArea">
          <br>
         <div id="billArea"
     style="width:650px;margin:auto;
            font-family:Arial, sans-serif;
            border:1px solid #000;
            padding:20px;">

  <!-- Company Header -->
  <div style="text-align:center;">
    <h2 style="margin:0;">ABCD COMPANY</h2>
    <p style="margin:4px 0;">
      Brahmanakraka, Nellore District, Andhra Pradesh
    </p>
    <p style="font-size:12px;margin:4px 0;">
      Phone: +91 8428820714
    </p>
    <hr>
  </div>

  <!-- Bill Title -->
  <h3 style="text-align:center;margin:10px 0;">
    BILL / INVOICE
  </h3>

  <!-- Bill Details -->
  <table width="100%" cellpadding="8" cellspacing="0"
         style="border-collapse:collapse;border:1px solid #000;">
    
    <tr align="left">
      <th style="border:1px solid #000;">Bill ID</th>
      <td style="border:1px solid #000;">${data.data[0]}</td>
    </tr>

    <tr align="left">
      <th  style="border:1px solid #000;">Customer ID</th>
      <td style="border:1px solid #000;">${data.data[1]}</td>
    </tr>

    <tr align="left">
      <th style="border:1px solid #000;">Customer Name</th>
      <td style="border:1px solid #000;">${data.data[2]}</td>
    </tr>

    <tr align="left">
      <th style="border:1px solid #000;">Billing Month</th>
      <td style="border:1px solid #000;">${data.data[3]}</td>
    </tr>

    <tr align="left">
      <th style="border:1px solid #000;">Issued Date</th>
      <td style="border:1px solid #000;">${data.data[5]}</td>
    </tr>

    <tr align="left">
      <th style="border:1px solid #000;">Issued By</th>
      <td style="border:1px solid #000;">${data.data[6]}</td>
    </tr>

    <tr align="left">
      <th style="border:1px solid #000;">Total Amount</th>
      <td style="border:1px solid #000;font-weight:bold;">
        Rs. ${data.data[4]}
      </td>
    </tr>
  </table>

  <br>

  <!-- Footer Note -->
  <p style="text-align:center;font-size:12px;">
    *This bill is auto‑generated by the system and does not require a signature.*
  </p>

  <p style="text-align:center;font-size:12px;">
    Thank you for choosing ABCD Company.
  </p>
</div>

          <br>
          <button onclick="printBill()"> Print</button>
          <button onclick="location.reload();"> Close</button>
        </div>
      `;
    }

    /* ✅ PRINT LOGIC */
    function printBill() {
      const content = document.getElementById("billArea").innerHTML;
      const original = document.body.innerHTML;

      document.body.innerHTML = content;
      window.print();
      document.body.innerHTML = original;
    }
  </script>

</body>
</html>
