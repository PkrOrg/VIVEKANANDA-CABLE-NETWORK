<!DOCTYPE html>
<html>
<head>
  <title>Prasanna Bill Entry sheet</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin-top: 50px;
    }
    form {
      display: inline-block;
      padding: 20px;
      border: 1px solid #ccc;
      border-radius: 8px;
      background: #f9f9f9;
    }
    input, select, button {
      margin: 10px;
      padding: 8px;
      width: 200px;
    }
    button {
      cursor: pointer;
      background: #0078d7;
      color: white;
      border: none;
      border-radius: 4px;
    }
    button:hover {
      background: #005fa3;
    }
  </style>
</head>
<body>
  <h2>Prasanna Bill Entry sheet</h2>
  <p id="status"></p>
<div id="loading" style="display:none;">⏳ Loading...</div>

  <form id="dataForm">
    <input type="number" id="id" placeholder="Enter Id" required />
    <input type="text" id="name" placeholder="Enter Name" required />
    <input type="number" id="amount" placeholder="Enter Amount" required />

    <select id="month" required>
      <option value="">Select Month</option>
      <option>January</option>
      <option>February</option>
      <option>March</option>
      <option>April</option>
      <option>May</option>
      <option>June</option>
      <option>July</option>
      <option>August</option>
      <option>September</option>
      <option>October</option>
      <option>November</option>
      <option>December</option>
    </select>
    <button type="submit">Submit</button>
  </form>

  <p id="status"></p>

  <script>
    const scriptURL = "https://script.google.com/macros/s/AKfycbwhUHDUlohD-H7XBXEKbnrwW3Kc11hnMsRTU9umKtKwmQuFI2SGfO21lpjNlJb6IwYc/exec";

    document.getElementById("dataForm").addEventListener("submit", e => {
       document.querySelector("#dataForm button").disabled = true;
       document.getElementById("loading").style.display = "block";
       document.getElementById("status").textContent = "";
       e.preventDefault();

       const name = document.getElementById("name").value;
       const month = document.getElementById("month").value;
       const id = document.getElementById("id").value;
       const issuedby = "PKR";
       const amount = document.getElementById("amount").value;

       

       fetch(scriptURL, {
          method: "POST",
          headers: {
          "Content-Type": "application/x-www-form-urlencoded"
          },
          body: "name="+name+"&month="+month+"&id="+id+"&issuedby="+issuedby+"&amount="+amount 
       })
       .then(response => response.text())
       .then(result => {
          document.getElementById("status").textContent = "Data inserted successfully!";
          document.getElementById("dataForm").reset();
       })
    .catch(error => {
       document.getElementById("status").textContent = "Error inserting data.";
       console.error("Error:", error);
    })
    .finally(() => {
       // Hide loading symbol
       document.getElementById("loading").style.display = "none";
       document.querySelector("#dataForm button").disabled = false;
    });
 });

  </script>
</body>
</html>
