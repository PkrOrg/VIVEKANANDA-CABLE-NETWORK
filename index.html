
<html>
<head>
  <title>Prasanna Billing App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #4facfe, #00f2fe);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .box {
      background: #fff;
      padding: 40px;
      border-radius: 15px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      text-align: center;
      width: 300px;
    }

    h1, h2 {
      color: #333;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      background: #007bff;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    .btn {
      display: block;
      text-decoration: none;
      margin: 15px 0;
      padding: 12px;
      border-radius: 8px;
      font-size: 16px;
      font-weight: bold;
      color: white;
    }

    .btn-customer { background: #28a745; }
    .btn-bill { background: #007bff; }
    .btn-display { background: #ff5722; }

    .hidden {
      display: none;
    }

    .error {
      color: red;
      font-size: 13px;
    }
  </style>
</head>

<body>

  <!-- 🔐 LOGIN -->
  <div id="loginBox" class="box">
    <h2>🔐 Login</h2>

    <input type="text" id="username" placeholder="Username" value="admin">
    <input type="password" id="password" placeholder="Password" value="myBill@1">

    <button onclick="login()">Login</button>
    <div id="error" class="error"></div>
  </div>

  <!-- 📊 DASHBOARD -->
  <div id="dashboard" class="box hidden">
    <h1>📊 Billing Dashboard</h1>

    <a href="customers.html" class="btn btn-customer">👤 Customer Page</a>
    <a href="bill.html" class="btn btn-bill">🧾 Billing Page</a>
    <a href="display.html" class="btn btn-display">📄 View All Bills</a>

    <button onclick="logout()">Logout</button>
  </div>

  <script>
    // Check login on load
    window.onload = function () {
      if (localStorage.getItem("loggedIn") === "true") {
        showDashboard();
      }
    };

    function showDashboard() {
      document.getElementById("loginBox").classList.add("hidden");
      document.getElementById("dashboard").classList.remove("hidden");
    }

    function showLogin() {
      document.getElementById("loginBox").classList.remove("hidden");
      document.getElementById("dashboard").classList.add("hidden");
    }

    async function login() {
      const username = document.getElementById("username").value;
      const password = document.getElementById("password").value;

      const scriptURL = "https://script.google.com/macros/s/AKfycbwhUHDUlohD-H7XBXEKbnrwW3Kc11hnMsRTU9umKtKwmQuFI2SGfO21lpjNlJb6IwYc/exec";

	const payload = new URLSearchParams({
    		username: "admin",
		password: "myBill@1"
  	});

	fetch(scriptURL, { method: "POST", body: payload })
    	.then(r => r.json())
    	.then(data => {
			if (data.success) {
        		   localStorage.setItem("loggedIn", "true");
                           showDashboard();
                        } else {
                            document.getElementById("error").innerText = "Invalid login!";
                        }
      })
   	.catch(() => document.getElementById("error").innerText = "Invalid login!")
    	//.finally(() => loadingEl.style.display = "none");      
    }

    function logout() {
      localStorage.removeItem("loggedIn");
      showLogin();
    }
  </script>

</body>
</html>
