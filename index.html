<!DOCTYPE html>
<html>
<head>
  <title>Prasanna Billing App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #4facfe, #00f2fe);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      background: #fff;
      padding: 40px;
      border-radius: 15px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      text-align: center;
      width: 300px;
    }

    h1 {
      margin-bottom: 30px;
      color: #333;
    }

    .btn {
      display: block;
      text-decoration: none;
      margin: 15px 0;
      padding: 12px;
      border-radius: 8px;
      font-size: 16px;
      font-weight: bold;
      color: white;
      transition: 0.3s;
    }

    .btn-customer {
      background: #28a745;
    }

    .btn-bill {
      background: #007bff;
    }

    .btn-display {
      background: #ff5722;
    }

    .btn:hover {
      transform: scale(1.05);
      opacity: 0.9;
    }

    .footer {
      margin-top: 20px;
      font-size: 12px;
      color: #777;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>📊 Billing Dashboard</h1>

    <a href="customers.html" class="btn btn-customer">👤 Customer Page</a>
    <a href="bill.html" class="btn btn-bill">🧾 Billing Page</a>
    <a href="display.html" class="btn btn-display">📄 View Data</a>

    <div class="footer">
      © Prasanna App
    </div>
  </div>

</body>
</html>
